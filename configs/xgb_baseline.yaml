# XGBoost baseline configuration

model:
  name: "xgboost"
  type: "regression"

features:
  type: "morgan_fingerprint"
  params:
    radius: 2
    n_bits: 2048

hyperparameters:
  n_estimators: 500
  max_depth: 6
  learning_rate: 0.1
  subsample: 0.8
  colsample_bytree: 0.8
  min_child_weight: 3
  reg_alpha: 0.0
  reg_lambda: 1.0
  random_state: 42
  n_jobs: -1

search_grid:
  n_estimators: [300, 500, 1000]
  max_depth: [4, 6, 8, 10]
  learning_rate: [0.01, 0.05, 0.1]
  subsample: [0.7, 0.8, 0.9]
  colsample_bytree: [0.7, 0.8, 0.9]
  min_child_weight: [1, 3, 5]

uncertainty:
  method: "quantile_regression"  # Train quantile regressors for prediction intervals
