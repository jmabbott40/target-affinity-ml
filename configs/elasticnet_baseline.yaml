# ElasticNet baseline configuration

model:
  name: "elasticnet"
  type: "regression"

features:
  type: "rdkit_descriptors"
  params:
    scaling: "standard"  # StandardScaler fit on train set

hyperparameters:
  alpha: 1.0
  l1_ratio: 0.5
  max_iter: 10000
  random_state: 42

search_grid:
  alpha: [0.001, 0.01, 0.1, 0.5, 1.0, 5.0, 10.0]
  l1_ratio: [0.1, 0.3, 0.5, 0.7, 0.9, 1.0]

uncertainty:
  method: "bootstrap"
  n_bootstrap: 100  # Number of bootstrap resamples
